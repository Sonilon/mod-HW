name: Build ChatGuard

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.1.1

      - name: Build
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: chatguard-mod
          path: build/libs/chatguard-*.jar
